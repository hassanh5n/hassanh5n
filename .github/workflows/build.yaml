name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVG profile
        timeout-minutes: 2
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
          BIRTHDAY: ${{ secrets.BIRTHDAY || '2004-02-19' }}
          LOC_TIMEOUT_SECONDS: 15
          LOC_REPO_LIMIT: 8
        run: python generate_profile.py

      - name: Publish generated SVGs
        env:
          PROFILE_BRANCH: profile-assets
          PROFILE_COMMIT_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
          PROFILE_COMMIT_EMAIL: ${{ secrets.PROFILE_COMMIT_EMAIL || format('{0}@users.noreply.github.com', github.repository_owner) }}
        run: |
          mkdir -p /tmp/profile-svg
          cp dark_mode.svg light_mode.svg /tmp/profile-svg/

          git config user.name "$PROFILE_COMMIT_NAME"
          git config user.email "$PROFILE_COMMIT_EMAIL"

          if git ls-remote --exit-code --heads origin "$PROFILE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$PROFILE_BRANCH"
            git switch -C "$PROFILE_BRANCH" "origin/$PROFILE_BRANCH"
          else
            git switch --orphan "$PROFILE_BRANCH"
          fi

          git rm -r --ignore-unmatch .
          cp /tmp/profile-svg/dark_mode.svg /tmp/profile-svg/light_mode.svg .
          git add dark_mode.svg light_mode.svg
          git diff --cached --quiet || git commit -m "Update profile SVG"
          git push origin "$PROFILE_BRANCH"