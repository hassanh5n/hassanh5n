name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVG profile
        timeout-minutes: 5
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
          BIRTHDAY: ${{ secrets.BIRTHDAY || '2004-02-19' }}
        run: python generate_profile.py

      - name: Commit generated SVGs
        env:
          PROFILE_COMMIT_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
          PROFILE_COMMIT_EMAIL: ${{ secrets.PROFILE_COMMIT_EMAIL || format('{0}@users.noreply.github.com', github.repository_owner) }}
        run: |
          git config user.name "$PROFILE_COMMIT_NAME"
          git config user.email "$PROFILE_COMMIT_EMAIL"
          git add dark_mode.svg light_mode.svg
          git diff --cached --quiet || git commit -m "Update profile SVG [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main